name: xxsmartsystems
description: IoT Control Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # API calls
  http: ^1.1.0
  
  # Store login token
  shared_preferences: ^2.2.0
  
  # MQTT for hardware
  mqtt_client: ^10.0.0
  
  # Drag and drop
  flutter_staggered_grid_view: ^0.7.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true